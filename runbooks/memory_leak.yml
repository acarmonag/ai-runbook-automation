name: memory_leak
description: |
  Handles memory leak detection and high memory usage scenarios.
  This runbook analyzes memory growth trends, finds OOM events in logs,
  and restarts the service to reclaim memory. Verifies via memory metrics
  and alert_status. Escalates if memory grows rapidly again after restart.

triggers:
  - MemoryLeakDetected
  - HighMemoryUsage
  - ContainerOOMKilled
  - MemoryUsageHigh

actions:
  - "get_metrics: Query memory usage trend — container_memory_usage_bytes to confirm memory >1500MB and growing"
  - "get_recent_logs: Fetch last 300 lines — look for OutOfMemoryError, heap dump warnings, cache leak messages"
  - "run_diagnostic: Run memory_pressure diagnostic for system-level memory state"
  - "restart_service: Restart the leaking service to reclaim memory and reset heap (requires approval)"
  - "get_metrics: Re-query memory after restart — expect drop from >1800MB to <500MB"
  - "run_diagnostic: Run alert_status to confirm memory alert resolved"

verification:
  resolved_when:
    - "alert_status returns alert_firing=false"
    - "memory drops below 500MB (down from >1800MB)"
    - "memory remains stable 5 minutes after restart"
  escalate_when:
    - "memory returns to >85% of limit within 10 minutes of restart"
    - "OOM kills occurring faster than restarts can handle"

escalation_threshold: |
  Escalate if memory returns to >85% of limit within 10 minutes after restart,
  indicating an active memory leak requiring code-level investigation.

metadata:
  severity: P2
  team: platform
  runbook_version: "2.0"
  last_updated: "2026-04-11"
