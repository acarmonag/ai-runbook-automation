name: service_down
description: |
  Handles service outages and failing health checks.
  This runbook immediately checks service state, collects crash logs,
  attempts a restart, and verifies recovery. If the service does not
  recover after restart, escalates immediately — service downtime is P1.

triggers:
  - ServiceDown
  - HealthCheckFailing
  - ServiceUnreachable
  - ContainerCrashed
  - PodCrashLooping

actions:
  - "get_service_status: Immediately check current container state, restart count, and last exit code"
  - "get_recent_logs: Fetch last 500 lines from the crashed service to identify crash reason"
  - "run_diagnostic: Run error_rate diagnostic to confirm service is truly down vs. partial failure"
  - "restart_service: Restart the service (requires approval — but note: service is already down)"
  - "get_service_status: Verify service is back up and running after restart"
  - "get_metrics: Query health check success rate to confirm recovery — up{job='service-name'}"
  - "escalate: Escalate immediately if service does not recover within 2 restart attempts"

escalation_threshold: |
  Escalate immediately (P1) if:
  - Service does not come up after restart
  - Service crashes again within 5 minutes of restart
  - Exit code indicates OOM kill (exit code 137)
  - Logs show database connection failures (potential cascading failure)

metadata:
  severity: P1
  team: platform
  runbook_version: "1.0"
  last_updated: "2024-01-01"
