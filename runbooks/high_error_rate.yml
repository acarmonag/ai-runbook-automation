name: high_error_rate
description: |
  Handles elevated HTTP error rates and service degradation.
  This runbook investigates the source of errors, attempts to identify
  known error patterns in logs, and restarts the service if errors match
  a known bug pattern. Verifies resolution via metrics and alert_status.

triggers:
  - HighErrorRate
  - ServiceDegraded
  - HighHttpErrorRate

actions:
  - "get_metrics: Query current error rate — rate(http_requests_total{status=~'5..'}[5m]) to confirm error rate >5%"
  - "get_recent_logs: Fetch last 200 lines from the affected service to identify error patterns (NullPointerException, connection pool exhausted, etc.)"
  - "run_diagnostic: Run error_rate diagnostic to get precise error rate percentage"
  - "restart_service: Restart the service to clear connection pool exhaustion or transient bugs (requires approval)"
  - "get_metrics: Re-query error rate after restart — expect drop from >15% to <1%"
  - "run_diagnostic: Run alert_status to confirm the alert is no longer firing"

verification:
  resolved_when:
    - "alert_status returns alert_firing=false"
    - "error rate drops below 1% (down from >15%)"
  escalate_when:
    - "error rate remains above 10% after restart"
    - "error pattern is unknown or indicates data corruption"

escalation_threshold: |
  Escalate if HTTP error rate remains above 10% after service restart,
  or if error pattern indicates data corruption or unknown root cause.

metadata:
  severity: P2
  team: platform
  runbook_version: "2.0"
  last_updated: "2026-04-11"
