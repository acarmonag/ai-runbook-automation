name: cpu_spike
description: |
  Handles CPU saturation and sustained high CPU usage.
  This runbook identifies the CPU hog (goroutine leak, infinite loop, hot query),
  restarts or scales the service to relieve CPU pressure, and verifies via
  CPU metrics and alert_status after remediation.

triggers:
  - HighCPU
  - CPUSaturation
  - CPUThrottling
  - ContainerCPUHigh

actions:
  - "get_metrics: Query CPU usage — rate(container_cpu_usage_seconds_total[5m]) to confirm CPU >90%"
  - "get_recent_logs: Fetch last 100 lines — look for goroutine leak, infinite loop, hot-loop indicators"
  - "run_diagnostic: Run connection_count diagnostic — high connections can saturate CPU"
  - "restart_service: Restart service to clear goroutine leaks and CPU-bound infinite loops (requires approval)"
  - "get_metrics: Re-query CPU after restart — expect drop from >90% to <50%"
  - "run_diagnostic: Run alert_status to confirm CPU alert resolved"

verification:
  resolved_when:
    - "alert_status returns alert_firing=false"
    - "CPU drops below 50% (down from >90%)"
    - "p99 latency returns to <1s"
  escalate_when:
    - "CPU stays above 90% after restart and scaling to 8 replicas"
    - "root cause is inefficient query or code-level hot loop"

escalation_threshold: |
  Escalate if CPU stays above 90% after restart and scaling to maximum 8 replicas.
  This indicates a code-level issue that cannot be solved by horizontal scaling.

metadata:
  severity: P2
  team: platform
  runbook_version: "2.0"
  last_updated: "2026-04-11"
