name: high_latency
description: |
  Handles elevated response latency and slow endpoint issues.
  This runbook identifies which endpoints are slow, checks CPU and memory,
  and restarts or scales the service to relieve pressure. Verifies via
  latency metrics and alert_status after remediation.

triggers:
  - HighLatency
  - SlowEndpoint
  - HighResponseTime
  - P99LatencyHigh

actions:
  - "get_metrics: Query p99 latency — histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m])) to confirm latency >3s"
  - "get_metrics: Query CPU utilization — rate(container_cpu_usage_seconds_total[5m]) to check if CPU is saturated"
  - "get_recent_logs: Fetch last 200 lines — look for GC pauses, thread pool saturation, slow query warnings"
  - "run_diagnostic: Run memory_pressure diagnostic to check for memory saturation"
  - "restart_service: Restart service to clear JVM heap, goroutine leak, or thread pool saturation (requires approval)"
  - "get_metrics: Re-query p99 latency after restart — expect drop from >4s to <0.5s"
  - "run_diagnostic: Run alert_status to confirm the latency alert resolved"

verification:
  resolved_when:
    - "alert_status returns alert_firing=false"
    - "p99 latency drops below 1s (down from >3s)"
    - "CPU usage drops below 50%"
  escalate_when:
    - "p99 latency remains above 5s after scaling to maximum replicas"
    - "latency caused by upstream dependency issues"

escalation_threshold: |
  Escalate if p99 latency remains above 5s after restart/scaling,
  or if the root cause is an upstream dependency issue.

metadata:
  severity: P2
  team: platform
  runbook_version: "2.0"
  last_updated: "2026-04-11"
