services:

  # ── HTTP API (alert intake, incident reads, WebSocket hub) ─────────────────
  agent-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - LLM_BACKEND=${LLM_BACKEND:-ollama}
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3:14b}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - PROMETHEUS_URL=http://mock-prometheus:9091
      - DATABASE_URL=postgresql+asyncpg://sre:sre@postgres:5432/runbooks
      - REDIS_URL=redis://redis:6379
      - APPROVAL_MODE=${APPROVAL_MODE:-AUTO}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - API_KEY=${API_KEY:-}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - PAGERDUTY_ROUTING_KEY=${PAGERDUTY_ROUTING_KEY:-}
      - CORRELATION_WINDOW_SECONDS=${CORRELATION_WINDOW_SECONDS:-300}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mock-prometheus:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Agent worker (LLM reasoning loop, action execution) ────────────────────
  agent-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      - LLM_BACKEND=${LLM_BACKEND:-ollama}
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3:14b}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - PROMETHEUS_URL=http://mock-prometheus:9091
      - DATABASE_URL=postgresql+asyncpg://sre:sre@postgres:5432/runbooks
      - REDIS_URL=redis://redis:6379
      - APPROVAL_MODE=${APPROVAL_MODE:-AUTO}
      - NUM_WORKERS=${NUM_WORKERS:-4}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - PAGERDUTY_ROUTING_KEY=${PAGERDUTY_ROUTING_KEY:-}
      - CORRELATION_WINDOW_SECONDS=${CORRELATION_WINDOW_SECONDS:-300}
    volumes:
      - ./runbooks:/app/runbooks:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sre
      POSTGRES_PASSWORD: sre
      POSTGRES_DB: runbooks
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sre -d runbooks"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis (job queue + pub/sub) ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Mock Prometheus ─────────────────────────────────────────────────────────
  mock-prometheus:
    build:
      context: .
      dockerfile: Dockerfile.prometheus
    ports:
      - "9091:9091"
    environment:
      - MOCK_SCENARIO=${MOCK_SCENARIO:-high_error_rate}
      - PORT=9091
    restart: unless-stopped

  # ── Alertmanager ────────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.26.0
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager:/etc/alertmanager:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
    depends_on:
      - agent-api
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
