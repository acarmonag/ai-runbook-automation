services:
  agent-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      # LLM backend — "ollama" uses your local Ollama; "claude" requires ANTHROPIC_API_KEY
      - LLM_BACKEND=${LLM_BACKEND:-ollama}
      # Points to Ollama running on the host machine (not in Docker)
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3:14b}
      # Claude (only needed when LLM_BACKEND=claude)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # Infrastructure
      - PROMETHEUS_URL=http://mock-prometheus:9091
      - APPROVAL_MODE=${APPROVAL_MODE:-AUTO}
      - NUM_WORKERS=${NUM_WORKERS:-2}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DRY_RUN=${DRY_RUN:-false}
      - INCIDENTS_FILE=/data/incidents.jsonl
      - ESCALATION_LOG_FILE=/data/escalations.jsonl
    volumes:
      - agent-data:/data
      - ./runbooks:/app/runbooks:ro
    depends_on:
      mock-prometheus:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  mock-prometheus:
    build:
      context: .
      dockerfile: Dockerfile.prometheus
    ports:
      - "9091:9091"
    environment:
      - MOCK_SCENARIO=${MOCK_SCENARIO:-high_error_rate}
      - PORT=9091
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.26.0
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager:/etc/alertmanager:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
    depends_on:
      - agent-api
    restart: unless-stopped

volumes:
  agent-data:
